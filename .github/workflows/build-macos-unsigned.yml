name: Build macOS unsigned

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-macos-unsigned.yml"
      - "src/**"
      - "src-tauri/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "vite.config.ts"
      - "tsconfig*.json"
      - "tailwind.config.cjs"
      - "postcss.config.cjs"

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Intel
            runner: macos-13
            target: x86_64-apple-darwin
          - name: macOS Apple Silicon
            runner: macos-14
            target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build unsigned macOS installer
        env:
          APPLE_SIGNING_IDENTITY: "-"
        run: >
          pnpm tauri build
          --target ${{ matrix.target }}
          --config '{"bundle":{"createUpdaterArtifacts":false,"macOS":{"signingIdentity":null}}}'

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kaka-ai-client-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error
